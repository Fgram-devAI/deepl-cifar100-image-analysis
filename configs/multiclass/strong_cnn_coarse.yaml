architecture: strong_cnn
run_name: strong_cnn_coarse_multiclass_regularized_aug
seed: 42

task:
  type: multiclass
  label_level: coarse

validation:
  fraction: 0.1
  stratify: false

class_imbalance:
  strategy: none

batch_size: 128
shuffle_buffer: 4096
dropout: 0.45

augmentation:
  enabled: true
  horizontal_flip: true
  translation: 0.05
  zoom: 0.05
  rotation: 0.02
  contrast: 0.05

epochs: 30
optimizer: adam
learning_rate: 3e-5
gradient_clipnorm: 1.0
early_stopping:
  monitor: val_accuracy
  patience: 10

output_dir: results/strong_cnn/multiclass/coarse
save_weights: true
subset_size: null
