architecture: efficientnet_b3
run_name: efficientnet_b3_fine_ft_in160_ep40
seed: 42

task:
  type: multiclass
  label_level: fine

validation:
  fraction: 0.1

class_imbalance:
  strategy: none

batch_size: 16               # smaller still — ALL 384 layers trainable
shuffle_buffer: 4096
dropout: 0.4
epochs: 40
optimizer: adam
learning_rate: 1e-5           # CRITICAL: very low LR — all 12M params unfrozen

freeze_backbone: false
unfreeze_from: all
freeze_bn: true
input_size: 160

augmentation:
  enabled: true
  horizontal_flip: true
  translation: 0.1
  zoom: 0.1
  rotation: 0.05
  contrast: 0.1

early_stopping:
  monitor: val_loss
  patience: 10

output_dir: results/efficientnet_b3_fine_ft
save_weights: true
subset_size: null
