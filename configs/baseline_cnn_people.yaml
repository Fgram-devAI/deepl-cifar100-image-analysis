architecture: baseline_cnn
run_name: baseline_cnn_people
seed: 42

task:
  label_level: coarse
  positive_label_names:
    - people

validation:
  fraction: 0.1
  stratify: true

class_imbalance:
  strategy: class_weights

batch_size: 64
shuffle_buffer: 4096
dropout: 0.3
epochs: 20
learning_rate: 1e-4

early_stopping:
  monitor: val_loss
  patience: 5

output_dir: results
save_weights: true
subset_size: null