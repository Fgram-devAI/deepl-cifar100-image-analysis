# Transfer-learning EfficientNetB0, frozen backbone, on the 100-class fine multiclass task.

architecture: efficientnet_b0
run_name: efficientnet_b0_fine_multiclass_frozen
seed: 42

resize_to: 128
trainable_backbone: false
dropout: 0.4
weights: imagenet

task:
  type: multiclass
  label_level: fine

validation:
  fraction: 0.1
  stratify: false

class_imbalance:
  strategy: none

batch_size: 64
shuffle_buffer: 4096

epochs: 30
optimizer: adam
learning_rate: 1e-3
early_stopping:
  monitor: val_loss
  patience: 5

output_dir: results/transfer/efficientnet/multiclass/fine
save_weights: true
subset_size: null
