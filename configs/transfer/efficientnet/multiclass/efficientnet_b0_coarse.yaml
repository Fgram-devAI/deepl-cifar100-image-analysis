# Transfer-learning EfficientNetB0, frozen backbone, on the 20-class coarse multiclass task.

architecture: efficientnet_b0
run_name: efficientnet_b0_coarse_multiclass_frozen
seed: 42

resize_to: 96
trainable_backbone: false
dropout: 0.3
weights: imagenet

task:
  type: multiclass
  label_level: coarse

validation:
  fraction: 0.1
  stratify: false

class_imbalance:
  strategy: none

batch_size: 32
shuffle_buffer: 4096

epochs: 10
optimizer: adam
learning_rate: 1e-3
early_stopping:
  monitor: val_loss
  patience: 5

output_dir: results/transfer/efficientnet/multiclass/coarse
save_weights: true
subset_size: null
